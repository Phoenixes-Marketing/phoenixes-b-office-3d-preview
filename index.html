<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>封王實業288號 3D 預覽</title>
    <script type="module" crossorigin src="./assets/index-BpsHZwFc.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-oQBodHrP.css">
  </head>
  <body>
    <main id="app">
      <canvas id="scene"></canvas>
      <header class="hud topbar">
        <div class="brand">
          <strong>封王實業288號</strong>
          <span>2026/07</span>
        </div>
        <div class="tools">
          <button id="resetView" class="icon-button" type="button" title="重置視角" aria-label="重置視角" data-lucide="rotate-ccw"></button>
          <button id="topView" class="icon-button" type="button" title="俯視" aria-label="俯視" data-lucide="scan"></button>
          <button id="toggleWallHeight" class="icon-button" type="button" title="牆高" aria-label="牆高" aria-expanded="false" aria-controls="wallHeightPanel" data-lucide="ruler"></button>
          <button id="toggleCadView" class="icon-button" type="button" title="黑白線條俯視圖" aria-label="黑白線條俯視圖" data-lucide="drafting-compass"></button>
          <button id="toggleFurniture" class="icon-button is-active" type="button" title="顯示/隱藏家具" aria-label="顯示/隱藏家具" data-lucide="eye-off"></button>
          <button id="toggleColumnEditor" class="icon-button" type="button" title="柱子臨時編輯" aria-label="柱子臨時編輯" data-lucide="columns-3"></button>
          <button id="toggleLabels" class="icon-button is-active" type="button" title="標籤" aria-label="標籤" data-lucide="tags"></button>
        </div>
      </header>
      <section class="hud panel wall-height-panel" id="wallHeightPanel" hidden>
        <label>
          <span>牆高 <output id="wallHeightValue">2.00m</output></span>
          <input id="wallHeight" type="range" min="1.5" max="3" step="0.05" value="2" />
        </label>
      </section>
      <section class="hud column-editor" id="columnEditor" hidden>
        <div class="column-editor__header">
          <div class="column-editor__title">
            <strong>柱子臨時編輯</strong>
            <span id="columnHint">重整後恢復原樣</span>
          </div>
          <button id="collapseColumnEditor" class="mini-icon-button" type="button" title="收合柱子編輯" aria-label="收合柱子編輯" aria-expanded="true" data-lucide="chevron-up"></button>
        </div>
        <div class="column-editor__body" id="columnEditorBody">
          <div class="column-editor__actions">
            <button id="addColumn" type="button">新增</button>
            <button id="deleteColumn" type="button">刪除</button>
            <button id="resetColumns" type="button">重設</button>
          </div>
          <div class="column-fields">
            <label>
              <span>X</span>
              <input id="columnX" type="number" step="1" />
            </label>
            <label>
              <span>Z</span>
              <input id="columnZ" type="number" step="1" />
            </label>
            <label>
              <span>寬</span>
              <input id="columnW" type="number" min="10" step="1" />
            </label>
            <label>
              <span>深</span>
              <input id="columnD" type="number" min="10" step="1" />
            </label>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
